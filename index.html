<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundMaster - Áudio para Owlbear (Sincronizado)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e0e0e0;
            padding: 16px;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(30, 30, 35, 0.95);
            border-radius: 16px;
            border: 1px solid #444;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #d4af37;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .sub {
            text-align: center;
            color: #888;
            font-size: 12px;
            margin-bottom: 20px;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }

        .gm-badge {
            background: #4a6a8a;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            margin-bottom: 15px;
            text-align: center;
        }

        .player-badge {
            background: #2a4a2a;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            margin-bottom: 15px;
            text-align: center;
        }

        .action-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            background: #3a3a3a;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #5d4723;
        }

        .btn-primary:hover {
            background: #7a5c30;
        }

        .btn-success {
            background: #2a5a2a;
        }

        .btn-success:hover {
            background: #3a7a3a;
        }

        .btn-danger {
            background: #6a2a2a;
        }

        .btn-danger:hover {
            background: #8a3a3a;
        }

        .btn-danger:disabled {
            background: #4a3a3a;
            cursor: not-allowed;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #2a2a2a;
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            border: 1px solid #d4af37;
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: #d4af37;
        }

        .modal-content input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: #1a1a1a;
            color: white;
            border: 1px solid #555;
            border-radius: 8px;
            font-size: 14px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .sounds-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .sound-card {
            background: #252525;
            border-radius: 12px;
            padding: 12px;
            border-left: 4px solid #d4af37;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .sound-checkbox {
            margin-top: 4px;
        }

        .sound-checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .sound-content {
            flex: 1;
        }

        .sound-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .sound-name {
            font-weight: bold;
            font-size: 15px;
            color: #d4af37;
            word-break: break-word;
        }

        .sound-controls {
            display: flex;
            gap: 6px;
        }

        .control-btn {
            background: #3a3a3a;
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }

        .control-btn.play {
            background: #2a5a2a;
        }

        .control-btn.play.playing {
            background: #8a3a3a;
        }

        .control-btn.pause {
            background: #4a6a8a;
        }

        .control-btn:hover {
            filter: brightness(1.1);
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }

        .volume-slider {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: #444;
            border-radius: 5px;
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #d4af37;
            cursor: pointer;
        }

        .volume-value {
            font-size: 11px;
            color: #d4af37;
            min-width: 40px;
            text-align: right;
        }

        .sound-url {
            font-size: 10px;
            color: #666;
            margin-top: 6px;
            word-break: break-all;
            font-family: monospace;
        }

        .no-sounds {
            text-align: center;
            color: #666;
            padding: 40px;
        }

        .delete-bar {
            margin-bottom: 15px;
            display: flex;
            justify-content: flex-end;
        }

        .status-info {
            font-size: 11px;
            color: #888;
            text-align: center;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #444;
        }

        .sync-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2a5a2a;
            margin-right: 6px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎵 SoundMaster</h1>
    <div class="sub">Reprodução simultânea de áudios sincronizada</div>

    <div id="rolePanel" style="text-align: center; margin-bottom: 15px;">
        <span id="roleBadge" class="gm-badge">⏳ Conectando...</span>
    </div>

    <div id="masterPanel" style="display: none;">
        <div class="action-bar">
            <button class="btn btn-primary" id="btnAddSound">➕ Adicionar Som</button>
            <button class="btn btn-success" id="btnExportList">💾 Exportar</button>
            <button class="btn" id="btnImportList">📂 Importar</button>
            <input type="file" id="importFileInput" accept=".json" style="display: none;">
        </div>
        <div class="delete-bar">
            <button class="btn btn-danger" id="btnDeleteSelected" disabled>🗑️ Excluir Selecionados</button>
        </div>
    </div>

    <div id="soundsContainer" class="sounds-list">
        <div class="no-sounds">📢 Nenhum som disponível.</div>
    </div>

    <div class="status-info">
        <span class="sync-indicator"></span>
        <span id="syncStatus">Sincronizado via Firebase</span>
    </div>
</div>

<!-- Modal -->
<div id="soundModal" class="modal">
    <div class="modal-content">
        <h3>➕ Adicionar Som</h3>
        <input type="text" id="soundName" placeholder="Nome do som">
        <input type="text" id="soundUrl" placeholder="URL do Dropbox ou arquivo .mp3">
        <div class="modal-buttons">
            <button class="btn" id="btnCancelModal">Cancelar</button>
            <button class="btn btn-primary" id="btnConfirmModal">Adicionar</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, push, update, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDLzqmIVK3AyExjc4hr6Jht4tLUnbHkCoE",
        authDomain: "mestragem-3det-alpha.firebaseapp.com",
        databaseURL: "https://mestragem-3det-alpha-default-rtdb.firebaseio.com",
        projectId: "mestragem-3det-alpha",
        storageBucket: "mestragem-3det-alpha.firebasestorage.app",
        messagingSenderId: "290185604308",
        appId: "1:290185604308:web:4d9ab0d246569a72629f41",
        measurementId: "G-PRJZGM2E1G"
    };

    let app = initializeApp(firebaseConfig);
    let db = getDatabase(app);
    
    // =========================================
    // VARIÁVEIS
    // =========================================
    let isGM = false;
    let roomId = null;
    let userId = null;
    let sounds = [];
    let audioElements = {};
    let syncTimeout = null;
    
    // Elementos
    const soundsContainer = document.getElementById('soundsContainer');
    const masterPanel = document.getElementById('masterPanel');
    const roleBadge = document.getElementById('roleBadge');
    const syncStatusSpan = document.getElementById('syncStatus');
    const btnAddSound = document.getElementById('btnAddSound');
    const btnExportList = document.getElementById('btnExportList');
    const btnImportList = document.getElementById('btnImportList');
    const btnDeleteSelected = document.getElementById('btnDeleteSelected');
    const importFileInput = document.getElementById('importFileInput');
    const soundModal = document.getElementById('soundModal');
    const btnCancelModal = document.getElementById('btnCancelModal');
    const btnConfirmModal = document.getElementById('btnConfirmModal');
    const soundNameInput = document.getElementById('soundName');
    const soundUrlInput = document.getElementById('soundUrl');

    // =========================================
    // FUNÇÕES DE SINCRONIZAÇÃO
    // =========================================
    
    function gerarRoomId() {
        // Tentar obter da URL ou criar um fixo para testes
        const urlParams = new URLSearchParams(window.location.search);
        let room = urlParams.get('room');
        if (!room) {
            room = localStorage.getItem('soundmaster_room');
        }
        if (!room) {
            room = 'sala_' + Math.random().toString(36).substr(2, 8);
            localStorage.setItem('soundmaster_room', room);
        }
        return room;
    }
    
    function gerarUserId() {
        let id = localStorage.getItem('soundmaster_userId');
        if (!id) {
            id = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('soundmaster_userId', id);
        }
        return id;
    }
    
    function sincronizarSounds() {
        if (!roomId) return;
        if (syncTimeout) clearTimeout(syncTimeout);
        syncTimeout = setTimeout(() => {
            const soundsRef = ref(db, `soundmaster/${roomId}/sounds`);
            const dataToSave = sounds.map(s => ({
                id: s.id,
                nome: s.nome,
                url: s.url,
                volume: s.volume,
                playing: s.playing,
                currentTime: s.currentTime
            }));
            set(soundsRef, dataToSave).catch(console.warn);
        }, 500);
    }
    
    function enviarComando(comando, soundId, valor) {
        if (!roomId || !isGM) return;
        
        const comandoRef = ref(db, `soundmaster/${roomId}/comandos`);
        push(comandoRef, {
            tipo: comando,
            soundId: soundId,
            valor: valor,
            enviadoPor: userId,
            timestamp: Date.now()
        }).catch(console.warn);
    }
    
    function processarComando(comando) {
        if (isGM) return; // Mestre já processa localmente
        
        switch(comando.tipo) {
            case 'play':
                playSoundSync(comando.soundId);
                break;
            case 'pause':
                pauseSoundSync(comando.soundId);
                break;
            case 'stop':
                stopSoundSync(comando.soundId);
                break;
            case 'volume':
                setVolumeSync(comando.soundId, comando.valor);
                break;
            case 'seek':
                seekSoundSync(comando.soundId, comando.valor);
                break;
        }
    }
    
    function playSoundSync(id) {
        const sound = sounds.find(s => s.id === id);
        if (!sound) return;
        
        let audio = audioElements[id];
        if (!audio) {
            audio = new Audio(sound.url);
            audio.volume = sound.volume || 0.7;
            audio.onended = () => {
                const s = sounds.find(s2 => s2.id === id);
                if (s) {
                    s.playing = false;
                    renderizar();
                }
            };
            audioElements[id] = audio;
        }
        
        audio.currentTime = sound.currentTime || 0;
        audio.play().catch(e => console.warn('Erro ao reproduzir:', e));
        sound.playing = true;
        renderizar();
    }
    
    function pauseSoundSync(id) {
        const sound = sounds.find(s => s.id === id);
        if (!sound) return;
        
        const audio = audioElements[id];
        if (audio) {
            audio.pause();
            sound.currentTime = audio.currentTime;
        }
        sound.playing = false;
        renderizar();
    }
    
    function stopSoundSync(id) {
        const sound = sounds.find(s => s.id === id);
        if (!sound) return;
        
        const audio = audioElements[id];
        if (audio) {
            audio.pause();
            audio.currentTime = 0;
        }
        sound.currentTime = 0;
        sound.playing = false;
        renderizar();
    }
    
    function setVolumeSync(id, volume) {
        const sound = sounds.find(s => s.id === id);
        if (sound) sound.volume = volume;
        
        const audio = audioElements[id];
        if (audio) audio.volume = volume;
        
        renderizar();
    }
    
    function seekSoundSync(id, time) {
        const sound = sounds.find(s => s.id === id);
        if (sound) sound.currentTime = time;
        
        const audio = audioElements[id];
        if (audio && audio.playing) {
            audio.currentTime = time;
        }
        renderizar();
    }
    
    function escutarComandos() {
        if (!roomId) return;
        
        const comandosRef = ref(db, `soundmaster/${roomId}/comandos`);
        onValue(comandosRef, (snapshot) => {
            const comandos = snapshot.val();
            if (!comandos) return;
            
            const comandosList = Object.values(comandos);
            const ultimoComando = comandosList[comandosList.length - 1];
            
            if (ultimoComando && ultimoComando.enviadoPor !== userId) {
                processarComando(ultimoComando);
            }
            
            // Limpar comandos antigos (manter apenas os últimos 20)
            const keys = Object.keys(comandos);
            if (keys.length > 20) {
                const toRemove = keys.slice(0, keys.length - 20);
                toRemove.forEach(key => {
                    set(ref(db, `soundmaster/${roomId}/comandos/${key}`), null);
                });
            }
        });
    }
    
    function escutarSounds() {
        if (!roomId) return;
        
        const soundsRef = ref(db, `soundmaster/${roomId}/sounds`);
        onValue(soundsRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            
            // Só atualiza se não for o mestre (mestre já tem os dados locais)
            if (!isGM) {
                sounds = data.map(s => ({
                    ...s,
                    playing: false,
                    currentTime: s.currentTime || 0
                }));
                renderizar();
            }
        });
    }
    
    // =========================================
    // FUNÇÕES DE ÁUDIO (COM ENVIO DE COMANDOS)
    // =========================================
    function renderizar() {
        if (sounds.length === 0) {
            soundsContainer.innerHTML = '<div class="no-sounds">📢 Nenhum som disponível.</div>';
            if (btnDeleteSelected) btnDeleteSelected.disabled = true;
            return;
        }

        let html = '';
        for (let i = 0; i < sounds.length; i++) {
            const s = sounds[i];
            const playBtnClass = s.playing ? 'play playing' : 'play';
            const playBtnText = s.playing ? '⏹️' : '▶️';
            const volumePercent = Math.round((s.volume || 0.7) * 100);
            
            html += `
                <div class="sound-card" data-id="${s.id}">
                    ${isGM ? `
                        <div class="sound-checkbox">
                            <input type="checkbox" class="sound-select" data-id="${s.id}">
                        </div>
                    ` : ''}
                    <div class="sound-content">
                        <div class="sound-header">
                            <div class="sound-name">${escapeHtml(s.nome)}</div>
                            <div class="sound-controls">
                                <button class="control-btn ${playBtnClass}" data-action="play" data-id="${s.id}">${playBtnText}</button>
                                <button class="control-btn pause" data-action="pause" data-id="${s.id}">⏸️</button>
                            </div>
                        </div>
                        <div class="volume-control">
                            <span>🔊</span>
                            <input type="range" class="volume-slider" min="0" max="1" step="0.01" value="${s.volume || 0.7}" data-action="volume" data-id="${s.id}">
                            <span class="volume-value">${volumePercent}%</span>
                        </div>
                        <div class="sound-url">${escapeHtml(s.url.length > 60 ? s.url.substring(0, 60) + '...' : s.url)}</div>
                    </div>
                </div>
            `;
        }
        soundsContainer.innerHTML = html;
        
        // Conectar eventos
        document.querySelectorAll('[data-action="play"]').forEach(btn => {
            btn.onclick = () => togglePlay(btn.getAttribute('data-id'));
        });
        
        document.querySelectorAll('[data-action="pause"]').forEach(btn => {
            btn.onclick = () => pauseSound(btn.getAttribute('data-id'));
        });
        
        document.querySelectorAll('[data-action="volume"]').forEach(slider => {
            slider.oninput = (e) => {
                const id = slider.getAttribute('data-id');
                const value = parseFloat(slider.value);
                const volSpan = slider.parentElement.querySelector('.volume-value');
                if (volSpan) volSpan.textContent = Math.round(value * 100) + '%';
                setVolume(id, value);
            };
        });
        
        if (isGM) {
            document.querySelectorAll('.sound-select').forEach(cb => {
                cb.onchange = () => atualizarBotaoExcluir();
            });
            atualizarBotaoExcluir();
        }
    }
    
    function atualizarBotaoExcluir() {
        const selecionados = document.querySelectorAll('.sound-select:checked').length;
        btnDeleteSelected.disabled = selecionados === 0;
    }
    
    function addSound(nome, url) {
        if (!nome.trim() || !url.trim()) {
            alert('Preencha o nome e a URL!');
            return false;
        }
        
        let finalUrl = url;
        if (url.includes('dropbox.com') && !url.includes('dl.dropboxusercontent.com')) {
            finalUrl = url.replace('www.dropbox.com', 'dl.dropboxusercontent.com').replace('?dl=0', '');
            if (!finalUrl.includes('?dl=1')) finalUrl += '?dl=1';
        }
        
        const newSound = {
            id: Date.now() + '_' + Math.random().toString(36).substr(2, 6),
            nome: nome.trim(),
            url: finalUrl,
            playing: false,
            currentTime: 0,
            volume: 0.7
        };
        
        sounds.push(newSound);
        renderizar();
        sincronizarSounds();
        return true;
    }
    
    function deleteSelected() {
        const selectedIds = [];
        document.querySelectorAll('.sound-select:checked').forEach(cb => {
            selectedIds.push(cb.getAttribute('data-id'));
        });
        
        if (selectedIds.length === 0) return;
        
        if (confirm(`Excluir ${selectedIds.length} som(ns)?`)) {
            selectedIds.forEach(id => {
                if (audioElements[id]) {
                    audioElements[id].pause();
                    audioElements[id].src = '';
                    delete audioElements[id];
                }
            });
            sounds = sounds.filter(s => !selectedIds.includes(s.id));
            renderizar();
            sincronizarSounds();
        }
    }
    
    function togglePlay(id) {
        const sound = sounds.find(s => s.id === id);
        if (!sound) return;
        
        if (sound.playing) {
            stopSound(id);
        } else {
            playSound(id);
        }
    }
    
    function playSound(id) {
        const sound = sounds.find(s => s.id === id);
        if (!sound) return;
        
        let audio = audioElements[id];
        if (!audio) {
            audio = new Audio(sound.url);
            audio.volume = sound.volume || 0.7;
            audio.onended = () => {
                const s = sounds.find(s2 => s2.id === id);
                if (s) {
                    s.playing = false;
                    renderizar();
                    sincronizarSounds();
                }
            };
            audioElements[id] = audio;
        }
        
        audio.currentTime = sound.currentTime || 0;
        audio.play().catch(e => console.warn('Erro ao reproduzir:', e));
        sound.playing = true;
        renderizar();
        sincronizarSounds();
        
        // Enviar comando para os jogadores
        enviarComando('play', id, null);
    }
    
    function pauseSound(id) {
        const sound = sounds.find(s => s.id === id);
        if (!sound) return;
        
        const audio = audioElements[id];
        if (audio) {
            audio.pause();
            sound.currentTime = audio.currentTime;
        }
        sound.playing = false;
        renderizar();
        sincronizarSounds();
        
        enviarComando('pause', id, null);
    }
    
    function stopSound(id) {
        const sound = sounds.find(s => s.id === id);
        if (!sound) return;
        
        const audio = audioElements[id];
        if (audio) {
            audio.pause();
            audio.currentTime = 0;
        }
        sound.currentTime = 0;
        sound.playing = false;
        renderizar();
        sincronizarSounds();
        
        enviarComando('stop', id, null);
    }
    
    function setVolume(id, volume) {
        const sound = sounds.find(s => s.id === id);
        if (sound) sound.volume = volume;
        
        const audio = audioElements[id];
        if (audio) audio.volume = volume;
        
        sincronizarSounds();
        enviarComando('volume', id, volume);
    }
    
    function exportar() {
        const data = sounds.map(s => ({
            nome: s.nome,
            url: s.url,
            volume: s.volume || 0.7
        }));
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `soundmaster_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
    }
    
    function importar(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported)) {
                    imported.forEach(item => {
                        if (item.nome && item.url) {
                            sounds.push({
                                id: Date.now() + '_' + Math.random().toString(36).substr(2, 6),
                                nome: item.nome,
                                url: item.url,
                                playing: false,
                                currentTime: 0,
                                volume: item.volume || 0.7
                            });
                        }
                    });
                    renderizar();
                    sincronizarSounds();
                    alert(`Importados ${imported.length} sons!`);
                } else {
                    alert('Arquivo inválido: formato incorreto.');
                }
            } catch(err) {
                alert('Erro ao importar: ' + err.message);
            }
        };
        reader.readAsText(file);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, (m) => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // =========================================
    // CONEXÃO COM OWLBear
    // =========================================
    async function conectarOwlbear() {
        roomId = gerarRoomId();
        userId = gerarUserId();
        
        syncStatusSpan.textContent = `Sala: ${roomId.substring(0, 15)}...`;
        
        if (typeof OBR !== 'undefined') {
            try {
                await OBR.onReady();
                const role = await OBR.room.getRole();
                isGM = (role === "HOST");
                
                if (isGM) {
                    roleBadge.className = 'gm-badge';
                    roleBadge.innerHTML = '👑 Modo Mestre (Sincronizado)';
                    masterPanel.style.display = 'block';
                } else {
                    roleBadge.className = 'player-badge';
                    roleBadge.innerHTML = '🎧 Modo Jogador (Sincronizado)';
                    masterPanel.style.display = 'none';
                }
                
                // Registrar presença
                const presenceRef = ref(db, `soundmaster/${roomId}/usuarios/${userId}`);
                set(presenceRef, {
                    nome: isGM ? 'Mestre' : 'Jogador',
                    online: true,
                    ultimaAtividade: serverTimestamp()
                });
                onDisconnect(presenceRef).update({ online: false, ultimaAtividade: serverTimestamp() });
                
                console.log('SoundMaster conectado ao Owlbear - GM:', isGM);
            } catch(err) {
                console.warn('Erro ao conectar OBR:', err);
                iniciarModoOffline();
            }
        } else {
            console.log('SDK do Owlbear não detectado');
            iniciarModoOffline();
        }
        
        // Iniciar listeners
        escutarSounds();
        escutarComandos();
    }
    
    function iniciarModoOffline() {
        isGM = true;
        roleBadge.className = 'gm-badge';
        roleBadge.innerHTML = '👑 Modo Mestre (Offline)';
        masterPanel.style.display = 'block';
        syncStatusSpan.innerHTML = '⚠️ Modo offline - sem sincronização';
        
        // Carregar dados do localStorage
        try {
            const saved = localStorage.getItem('soundmaster_sounds');
            if (saved) {
                sounds = JSON.parse(saved).map(s => ({
                    ...s,
                    playing: false,
                    currentTime: 0
                }));
                renderizar();
            }
        } catch(e) {}
    }
    
    function salvarLocal() {
        if (!roomId) return;
        try {
            localStorage.setItem('soundmaster_sounds', JSON.stringify(sounds.map(s => ({
                id: s.id,
                nome: s.nome,
                url: s.url,
                volume: s.volume
            }))));
        } catch(e) {}
    }
    
    // =========================================
    // EVENTOS DA UI
    // =========================================
    function configurarEventos() {
        if (btnAddSound) {
            btnAddSound.onclick = () => {
                soundNameInput.value = '';
                soundUrlInput.value = '';
                soundModal.style.display = 'flex';
            };
        }
        
        if (btnCancelModal) {
            btnCancelModal.onclick = () => {
                soundModal.style.display = 'none';
            };
        }
        
        if (btnConfirmModal) {
            btnConfirmModal.onclick = () => {
                const nome = soundNameInput.value.trim();
                const url = soundUrlInput.value.trim();
                if (addSound(nome, url)) {
                    soundModal.style.display = 'none';
                }
            };
        }
        
        if (btnExportList) {
            btnExportList.onclick = exportar;
        }
        
        if (btnImportList) {
            btnImportList.onclick = () => importFileInput.click();
        }
        
        if (btnDeleteSelected) {
            btnDeleteSelected.onclick = deleteSelected;
        }
        
        if (importFileInput) {
            importFileInput.onchange = (e) => {
                if (e.target.files && e.target.files[0]) {
                    importar(e.target.files[0]);
                    importFileInput.value = '';
                }
            };
        }
        
        if (soundModal) {
            soundModal.onclick = (e) => {
                if (e.target === soundModal) soundModal.style.display = 'none';
            };
        }
    }
    
    // Iniciar
    configurarEventos();
    conectarOwlbear();
    
    // Salvar local periódicamente
    setInterval(salvarLocal, 30000);
</script>
</body>
